name: C/C++ CI

on: [push, pull_request]

jobs:
  Linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: install dependencies
      run: |
        sudo apt-get install g++-9 autoconf-archive curl zlib1g-dev doxygen
        python3 -m pip install --upgrade pip
    - name: install liblo
      run: |
        curl -L -O https://github.com/radarsat1/liblo/releases/download/0.36/liblo-0.36.tar.gz
        tar -xzf liblo-0.36.tar.gz
        rm liblo-0.36.tar.gz
        mv liblo-0.36 liblo
        cd liblo
        (./configure --host=$HOST --prefix=$PWD/inst --enable-static --disable-shared --disable-tests --disable-tools --disable-examples --disable-doc CFLAGS=-fPIC || (cat config.log; false))
        make install
        find inst
        cd ..
    - name: autogen
      run: |
        pwd
        mkdir $PWD/inst
        env NOCONFIGURE=1 am_opt=--copy ./autogen.sh
        (./configure --enable-static --prefix=$PWD/inst PKG_CONFIG_PATH=$PWD/liblo/inst/lib/pkgconfig || (cat config.log; false))
    - name: make
      run: |
        make
        (make check || (for i in src/*.log; do echo === $i ===; cat $i; done; false))
        make install
        find inst
        cp -r ./liblo/inst/include/lo ./inst/include/
    - name: prepare test artifact
      run: |
        mkdir test_artifact
        mv ./test/.libs ./test_artifact/test
        mv ./inst ./test_artifact/
    - uses: actions/upload-artifact@v7
      with:
        name: tests_linux
        path: ./test_artifact
        retention-days: 1
    - name: make dist
      run: make dist
    - uses: actions/upload-artifact@v7
      with:
        name: linux_tarball
        path: |
          libmapper*.tar.gz
    - name: build wheels
      run: |
        make distclean
        bindings/python/build_wheels.py
    - uses: actions/upload-artifact@v7
      with:
        name: linux_wheel
        path: |
          ./wheelhouse/*.whl

  Linux-tests:
    runs-on: ubuntu-latest
    needs: Linux
    timeout-minutes: 10
    strategy:
      matrix:
        flags: [-qtf, -qtfs]
    steps:
      - name: download libraries
        uses: actions/download-artifact@v8
        with:
          name: tests_linux
      - name: run tests
        env:
          TEST_FLAGS: ${{ matrix.flags }}
        run: |
          cd test
          ls -al
          chmod +x *
          for i in *; do
           if [[ $i = "testinstance" || $i = "testinstance_no_cb" ]]; then continue; fi;
           echo Running $i $TEST_FLAGS;
           LD_LIBRARY_PATH=../inst/lib ./$i $TEST_FLAGS --iterations 200 || continue;
           echo Completed $i $TEST_FLAGS;
           done

  Linux-instance-tests:
    runs-on: ubuntu-latest
    needs: Linux-tests
    timeout-minutes: 5
    strategy:
      matrix:
        flags: [-qtf, -qtfs, -qtfp, -qtfps]
    steps:
      - name: download libraries
        uses: actions/download-artifact@v8
        with:
          name: tests_linux
      - name: run tests
        env:
          TEST_FLAGS: ${{ matrix.flags }}
        run: |
          cd test
          ls -al
          chmod +x *
          for i in testinstance testinstance_no_cb; do
           echo Running $i $TEST_FLAGS;
           LD_LIBRARY_PATH=../inst/lib ./$i $TEST_FLAGS || continue;
           echo Completed $i $TEST_FLAGS;
           done

  Linux-check-wheel:
    runs-on: ubuntu-latest
    needs: Linux-instance-tests
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: linux_wheel
      - name: install wheel
        run:
          ls
          && python3 -m pip install libmapper*-py3-none-manylinux_2_24_x86_64.whl
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: run python tests
        run:
          mkdir testpython
          && cd testpython
          && cp ../bindings/python/test*.py .
          && for i in test testcallbacks testconvergent testgetvalue testinstance testmapfromstr testnumpy testreverse testvector; do echo running ${i}; if ! python3 ${i}.py; then exit 1; fi; done;

  MacOS:
    runs-on: macOS-14
    timeout-minutes: 10
    env:
      CC: clang
      CXX: clang++
      COMMON: -isysroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk -mmacosx-version-min=10.10 -Qunused-arguments
      LDCOMMON: -mmacosx-version-min=10.10
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: install dependencies
      run: |
        brew install autoconf-archive automake pkg-config doxygen libtool
        python3 -m venv venv
        source venv/bin/activate
        python3 -m pip install --upgrade setuptools
        python3 -m pip install packaging
        python3 -m pip install wheel
        python --version
        python3 --version
    - name: download liblo
      run: |
        curl -L -O https://github.com/radarsat1/liblo/releases/download/0.36/liblo-0.36.tar.gz
        tar -xzf liblo-0.36.tar.gz
        rm liblo-0.36.tar.gz
        mv liblo-0.36 liblo
    - name: liblo build arm64
      run: |
        cd ./liblo
        mkdir $PWD/inst
        ./autogen.sh \
          CFLAGS="$COMMON -arch arm64 -fPIC" \
          CXXFLAGS="$COMMON -arch arm64" \
          LDFLAGS="$COMMON -arch arm64 $LDCOMMON" \
          --enable-static --disable-shared --disable-poll \
          --disable-tests --disable-tools --disable-examples --disable-doc \
          --prefix=$PWD/inst
        make install
        mv -v ./inst/lib/liblo.a ./inst/lib/liblo.a.arm64
        cd ..
    - name: liblo build x86_64
      run: |
        cd ./liblo
        make clean
        ./autogen.sh \
          CFLAGS="$COMMON -arch x86_64" \
          CXXFLAGS="$COMMON -arch x86_64" \
          LDFLAGS="$COMMON -arch x86_64 $LDCOMMON" \
          --enable-static --disable-shared --disable-poll \
          --disable-tests --disable-tools --disable-examples --disable-doc \
          --prefix=$PWD/inst
        make install
        mv -v ./inst/lib/liblo.a ./inst/lib/liblo.a.x86_64
        cd ..
    - name: liblo create universal binary
      run: |
        cd ./liblo/inst/lib
        lipo -create -output ./liblo.a ./liblo.a.arm64 ./liblo.a.x86_64
        lipo -info ./liblo.a
        rm ./liblo.a.*
        cd ../../..
    - name: libmapper build arm64
      run: |
        pwd
        mkdir $PWD/inst
        mkdir $PWD/inst/lib
        ./autogen.sh \
          CFLAGS="$COMMON -arch arm64" \
          CXXFLAGS="$COMMON -arch arm64" \
          LDFLAGS="$COMMON -arch arm64 $LDCOMMON" \
          --enable-static \
          --disable-audio --disable-docs --disable-java --disable-csharp \
          --prefix=$PWD/inst \
          PKG_CONFIG_PATH=$PWD/liblo/inst/lib/pkgconfig
        make install
        mv -v ./inst/lib/libmapper.15.dylib ./inst/lib/libmapper.15.dylib.arm64
        file ./inst/lib/libmapper.15.dylib.arm64
        mv -v ./inst/lib/libmapper.a ./inst/lib/libmapper.a.arm64
        lipo -info ./inst/lib/libmapper.a.arm64
    - name: libmapper build x86_64
      run: |
        make clean
        ./autogen.sh \
          CFLAGS="$COMMON -arch x86_64" \
          CXXFLAGS="$COMMON -arch x86_64" \
          LDFLAGS="$COMMON -arch x86_64 $LDCOMMON" \
          --enable-static \
          --disable-audio --disable-docs --disable-java --disable-csharp \
          --prefix=$PWD/inst \
          PKG_CONFIG_PATH=$PWD/liblo/inst/lib/pkgconfig
        make install
        mv -v ./inst/lib/libmapper.15.dylib ./inst/lib/libmapper.15.dylib.x86_64
        file ./inst/lib/libmapper.15.dylib.x86_64
        mv -v ./inst/lib/libmapper.a ./inst/lib/libmapper.a.x86_64
        lipo -info ./inst/lib/libmapper.a.x86_64
    - name: libmapper create universal binary
      run: |
        pwd
        find inst
        cd ./inst/lib
        lipo -create -output ./libmapper.a ./libmapper.a.arm64 ./libmapper.a.x86_64
        lipo -info ./libmapper.a
        rm ./libmapper.a.*
        file ./libmapper.15.dylib.arm64
        file ./libmapper.15.dylib.x86_64
        lipo -create -output ./libmapper.15.dylib ./libmapper.15.dylib.arm64 ./libmapper.15.dylib.x86_64
        file ./libmapper.15.dylib
        rm ./libmapper.15.dylib.*
        cd ../..
    - name: python wheels
      run:
        mv bindings/python/pyproject.toml bindings/python/pyproject.toml.temp
        && cp -v $PWD/inst/lib/libmapper.*.dylib bindings/python/libmapper/libmapper.dylib
        && pip3 wheel bindings/python -w ./wheelhouse
        && unzip -t wheelhouse/*.whl
    - uses: actions/upload-artifact@v7
      with:
        name: artifact_macos
        path: ./wheelhouse/*.whl
    - name: prepare test artifact
      run: |
        mkdir test_artifact
        mv ./test/.libs ./test_artifact/test
        mv ./inst ./test_artifact/
    - uses: actions/upload-artifact@v7
      with:
        name: tests_macos
        path: ./test_artifact
        retention-days: 1

  MacOS-tests:
    runs-on: macOS-14
    needs: MacOS
    timeout-minutes: 10
    strategy:
      matrix:
        flags: [-qtf, -qtfs]
    steps:
      - name: download libraries
        uses: actions/download-artifact@v8
        with:
          name: tests_macos
      - name: run tests
        env:
          TEST_FLAGS: ${{ matrix.flags }}
        run: |
          cd test
          ls -al
          chmod +x *
          for i in *; do
           if [[ $i = "testinstance" || $i = "testinstance_no_cb" ]]; then continue; fi;
           echo Running $i $TEST_FLAGS;
           DYLD_LIBRARY_PATH=../inst/lib ./$i $TEST_FLAGS --iterations 200 || continue;
           echo Completed $i $TEST_FLAGS;
           done

  MacOS-instance-tests:
    runs-on: macOS-14
    needs: MacOS-tests
    timeout-minutes: 10
    strategy:
      matrix:
        flags: [-qtf, -qtfs, -qtfp, -qtfps]
    steps:
      - name: download libraries
        uses: actions/download-artifact@v8
        with:
          name: tests_macos
      - name: run tests
        env:
          TEST_FLAGS: ${{ matrix.flags }}
        run: |
          cd test
          ls -al
          chmod +x *
          for i in testinstance testinstance_no_cb; do
           echo Running $i $TEST_FLAGS;
           DYLD_LIBRARY_PATH=../inst/lib ./$i $TEST_FLAGS || continue;
           echo Completed $i $TEST_FLAGS;
           done

  MacOS-check-wheel:
    runs-on: macOS-14
    needs: MacOS-instance-tests
    timeout-minutes: 5
    env:
      SYSTEM_VERSION_COMPAT: 0
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: artifact_macos
      - name: install wheel
        run:
          ls
          && python3 -m pip install libmapper*-py3-none-macosx_*_universal2.whl
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: run python tests
        run:
          mkdir testpython
          && cd testpython
          && cp ../bindings/python/test*.py .
          && for i in test testcallbacks testconvergent testgetvalue testinstance testmapfromstr testnumpy testreverse testvector; do echo running ${i}; if ! python3 ${i}.py; then exit 1; fi; done;

  Windows-Latest:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: install dependencies
      run:
        python3 -m pip install --upgrade setuptools
    - name: Run windows PowerShell build script
      shell: pwsh
      run: .\windows_build.ps1
    - name: Build python wheel
      run: .\bindings\python\windows_build_wheel.ps1
    - uses: actions/upload-artifact@v7
      with:
        name: artifact_windows
        path: ./bindings/python/dist/*.whl

  Windows-Latest-check-wheel:
    runs-on: windows-latest
    needs: Windows-Latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: artifact_windows
      - name: install wheel
        run:
          ls
          && python3 -m pip install libmapper-2.5.2-py3-none-win_amd64.whl
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: run python tests
        run:
          mkdir testpython
          && cd testpython
          && cp ../bindings/python/test*.py .
          && python3 ./test.py
          && python3 ./testcallbacks.py
          && python3 ./testconvergent.py
          && python3 ./testinstance.py
          && python3 ./testmapfromstr.py
          && python3 ./testreverse.py
          && python3 ./testvector.py
